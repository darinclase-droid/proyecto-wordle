<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wordle PRO</title>
  <style>
    body { font-family: Arial, sans-serif; background:#121213; color:white; display:flex; flex-direction:column; align-items:center; margin:0; padding:20px; }
    h1 { margin:10px; }
    #tablero { display:grid; grid-template-rows:repeat(6,1fr); gap:6px; margin:20px 0; }
    .fila { display:grid; grid-template-columns:repeat(5,60px); gap:6px; }
    .celda {
      width:60px; height:60px; border:2px solid #3a3a3c;
      display:flex; justify-content:center; align-items:center;
      font-size:2rem; font-weight:bold; text-transform:uppercase;
      transition: transform 0.3s;
    }
    .flip { transform: rotateX(360deg); }
    .verde { background:#6aaa64; border:none; }
    .amarillo { background:#c9b458; border:none; }
    .gris { background:#3a3a3c; border:none; }
    #teclado { margin-top:10px; }
    .fila-teclado { display:flex; justify-content:center; margin:5px; }
    .tecla {
      margin:2px; padding:10px; min-width:30px;
      background:#818384; border:none; border-radius:4px;
      color:white; cursor:pointer;
    }
    .tecla.verde { background:#6aaa64; }
    .tecla.amarillo { background:#c9b458; }
    .tecla.gris { background:#3a3a3c; }
    button { padding:10px 20px; margin:10px; cursor:pointer; border:none; border-radius:6px; background:#538d4e; color:white; font-size:1rem; }
    button:hover { opacity:0.9; }
    #botones-modo { display:flex; gap:10px; }
    #btn-clasico { background:#538d4e; }
    #btn-contrarreloj { background:#b59f3b; }
    #btn-clasico.activo { outline: 3px solid white; }
    #btn-contrarreloj.activo { outline: 3px solid white; }
  </style>
</head>
<body>
<h1>Wordle PRO</h1>
<button onclick="nuevaPartida()">Nueva partida</button>
<div id="stats"></div>
<div id="tablero"></div>
<div id="teclado"></div>
<div id="botones-modo">
  <button id="btn-clasico" onclick="activarModoClasico()">Modo clásico</button>
  <button id="btn-contrarreloj" onclick="activarContrarreloj()">Modo contrarreloj</button>
</div>
<div id="timer"></div>
<script src="script.js"></script>
</body>
</html>
